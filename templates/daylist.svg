<svg width="500" height="21" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMin meet" overflow="visible">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji';
      font-size: 14px;
      fill: {% if color_scheme == 'dark' %}rgb(240, 246, 252){% else %}rgb(31, 35, 40){% endif %};
    }
  </style>
  <text x="250" y="17" dominant-baseline="alphabetic" text-anchor="middle">
    {{ daylist_phrase }}
  </text>
</svg>
